<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Risk &amp; Reward Trader</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body {
            background: #0f172a;
            color: #e2e8f0;
            font-family: system-ui, -apple-system, sans-serif;
            padding-bottom: 80px;
        }
        .nav-link {
            color: #94a3b8;
            font-size: 0.9rem;
            padding: 8px 0;
        }
        .nav-link.active {
            color: #22d3ee;
            border-top: 3px solid #22d3ee;
        }
        .card {
            background: #1e2937;
            border: none;
            border-radius: 16px;
        }
        .form-control, .form-select {
            background: #334155 !important;
            border: none;
            color: #e2e8f0 !important;
            border-radius: 12px;
            height: 52px;
            font-size: 1.25rem;
        }
        .form-control:focus, .form-select:focus {
            background: #334155 !important;
            color: #e2e8f0 !important;
            box-shadow: 0 0 0 0.25rem rgba(34, 211, 238, 0.25);
        }
        .input-group-text {
            background: #22c55e;
            color: white;
            border: none;
            font-weight: 600;
        }
        .form-label {
            color: #94a3b8;
            font-size: 0.95rem;
            margin-bottom: 6px;
        }
        .result-box {
            background: linear-gradient(135deg, #22d3ee, #06b6d4);
            color: #0f172a;
            border-radius: 16px;
            padding: 14px 20px;
            font-size: 1.35rem;
            font-weight: 700;
        }
        .small-result {
            background: #334155;
            border-radius: 12px;
            padding: 12px 16px;
        }
        .helper-text {
            color: #94a3b8;
            font-size: 0.9rem;
            margin-top: 8px;
        }
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #1e2937;
            border-top: 1px solid #334155;
            z-index: 1000;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        .header {
            background: linear-gradient(135deg, #1e2937, #334155);
        }
        .recalc-btn {
            width: 100%;
            margin-top: 12px;
        }
        .result-label {
            font-weight: 700;
            color: #e2e8f0;
            opacity: 0.9;
        }
        .version {
            font-size: 0.75rem;
            color: #64748b;
            margin-left: 8px;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header py-3 text-center shadow-sm">
        <div class="d-flex align-items-center justify-content-center">
            <h4 class="mb-0 fw-bold text-cyan">Risk &amp; Reward Trader</h4>
            <span class="version">v1.3</span>
        </div>
    </div>

    <!-- Tab 1: Risk Amount -->
    <div id="tab1" class="tab-content active container mt-4">
        <div class="card mx-auto p-4" style="max-width: 420px;">
            <div class="mb-4">
                <label class="form-label">Portfolio Value</label>
                <div class="input-group">
                    <span class="input-group-text">$</span>
                    <input type="number" id="portfolio" class="form-control" placeholder="10000" onfocus="this.select()" oninput="calculateRisk()">
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label">% of Account to Risk</label>
                <div class="input-group">
                    <span class="input-group-text">%</span>
                    <input type="number" id="percent" class="form-control" placeholder="1" step="0.1" onfocus="this.select()" oninput="calculateRisk()">
                </div>
            </div>

            <div class="result-box text-center">
                <div class="result-label">Risk Amount</div>
                <div id="riskAmt" class="fs-3 fw-bold">$0.00</div>
            </div>

            <button onclick="calculateRisk()" class="btn btn-outline-info recalc-btn">
                <i class="bi bi-arrow-repeat"></i> Recalc
            </button>

            <div class="helper-text text-center">
                This is the maximum dollar amount you will risk on this trade
            </div>
        </div>
    </div>

    <!-- Tab 2: Position Size -->
    <div id="tab2" class="tab-content container mt-4">
        <div class="card mx-auto p-4" style="max-width: 420px;">
            <div class="mb-4">
                <label class="form-label">Entry Price ($)</label>
                <input type="number" id="entry" class="form-control" placeholder="45.50" step="0.01" onfocus="this.select()" oninput="calculateShares()">
            </div>

            <div class="mb-4">
                <label class="form-label">Stop Loss Price ($)</label>
                <input type="number" id="stop" class="form-control" placeholder="43.80" step="0.01" onfocus="this.select()" oninput="calculateShares()">
            </div>

            <div class="result-box text-center">
                <div class="result-label">Shares to Buy</div>
                <div id="shares" class="fs-3 fw-bold">—</div>
            </div>

            <div id="riskPerShareInfo" class="text-center mt-3 small text-muted">
                Risk per share: <span id="riskPerShare">$0.00</span>
            </div>

            <button onclick="calculateShares()" class="btn btn-outline-info recalc-btn">
                <i class="bi bi-arrow-repeat"></i> Recalc
            </button>
        </div>
    </div>

    <!-- Tab 3: Profit Target -->
    <div id="tab3" class="tab-content container mt-4">
        <div class="card mx-auto p-4" style="max-width: 420px;">
            <div class="mb-4">
                <label class="form-label">Risk : Reward Ratio</label>
                <select id="ratio" class="form-select" onchange="calculateTarget()">
                    <option value="1:2" selected>1:2</option>
                    <option value="2:3">2:3</option>
                    <option value="2:5">2:5</option>
                    <option value="1:3">1:3</option>
                </select>
            </div>

            <div class="row g-3">
                <div class="col-6">
                    <div class="small-result text-center">
                        <small class="text-white">Entry</small>
                        <div id="targetEntry" class="fs-3 fw-bold text-white">$0.00</div>
                    </div>
                </div>
                <div class="col-6">
                    <div class="small-result text-center">
                        <small class="text-white">Stop Loss</small>
                        <div id="targetStop" class="fs-3 fw-bold text-white">$0.00</div>
                    </div>
                </div>
            </div>

            <div class="result-box text-center mt-4">
                <div class="result-label">Profit Target</div>
                <div id="profitTarget" class="fs-3 fw-bold">$0.00</div>
            </div>

            <div class="mt-3 text-center">
                <div class="small text-success">
                    Potential Reward: <span id="rewardAmt">$0.00</span>
                </div>
            </div>

            <button onclick="calculateTarget()" class="btn btn-outline-info recalc-btn">
                <i class="bi bi-arrow-repeat"></i> Recalc
            </button>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <div class="container">
            <div class="row text-center">
                <div class="col-4">
                    <a href="#" onclick="switchTab(1)" class="nav-link active" id="nav1">
                        <i class="bi bi-shield-check fs-3 d-block"></i>
                        <span>Risk</span>
                    </a>
                </div>
                <div class="col-4">
                    <a href="#" onclick="switchTab(2)" class="nav-link" id="nav2">
                        <i class="bi bi-graph-up fs-3 d-block"></i>
                        <span>Shares</span>
                    </a>
                </div>
                <div class="col-4">
                    <a href="#" onclick="switchTab(3)" class="nav-link" id="nav3">
                        <i class="bi bi-trophy fs-3 d-block"></i>
                        <span>Target</span>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <script>
        let riskAmount = 0;

        function calculateRisk() {
            const portfolio = parseFloat(document.getElementById('portfolio').value) || 0;
            const percent = parseFloat(document.getElementById('percent').value) || 0;
            riskAmount = portfolio * (percent / 100);
            document.getElementById('riskAmt').textContent = '$' + riskAmount.toFixed(2);
        }

        function calculateShares() {
            const entry = parseFloat(document.getElementById('entry').value) || 0;
            const stop = parseFloat(document.getElementById('stop').value) || 0;
            
            if (entry <= stop || entry === 0) {
                document.getElementById('shares').textContent = '—';
                document.getElementById('riskPerShare').textContent = '$0.00';
                return;
            }
            
            const riskPerShare = entry - stop;
            let shares = Math.floor(riskAmount / riskPerShare);
            document.getElementById('shares').textContent = shares || '—';
            document.getElementById('riskPerShare').textContent = '$' + riskPerShare.toFixed(2);
        }

        function calculateTarget() {
            const entry = parseFloat(document.getElementById('entry').value) || 0;
            const stop = parseFloat(document.getElementById('stop').value) || 0;
            
            document.getElementById('targetEntry').textContent = '$' + entry.toFixed(2);
            document.getElementById('targetStop').textContent = '$' + stop.toFixed(2);
            
            if (entry <= stop || entry === 0) {
                document.getElementById('profitTarget').textContent = '$0.00';
                document.getElementById('rewardAmt').textContent = '$0.00';
                return;
            }
            
            const ratioStr = document.getElementById('ratio').value;
            const [riskPart, rewardPart] = ratioStr.split(':').map(Number);
            const rewardMultiplier = rewardPart / riskPart;
            
            const riskPerShare = entry - stop;
            const rewardPerShare = riskPerShare * rewardMultiplier;
            const targetPrice = entry + rewardPerShare;
            
            document.getElementById('profitTarget').textContent = '$' + targetPrice.toFixed(2);
            
            const shares = parseFloat(document.getElementById('shares').textContent) || 0;
            const totalReward = (targetPrice - entry) * shares;
            document.getElementById('rewardAmt').textContent = '$' + totalReward.toFixed(2);
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById('tab' + tab).classList.add('active');
            
            for (let i = 1; i <= 3; i++) {
                const nav = document.getElementById('nav' + i);
                if (i === tab) nav.classList.add('active');
                else nav.classList.remove('active');
            }
            
            if (tab === 1) calculateRisk();
            if (tab === 2) calculateShares();
            if (tab === 3) calculateTarget();
        }

        window.onload = function() {
            document.getElementById('portfolio').value = '';
            document.getElementById('percent').value = '';
            document.getElementById('entry').value = '';
            document.getElementById('stop').value = '';
            
            calculateRisk();
            setTimeout(() => {
                calculateShares();
                calculateTarget();
            }, 100);
        };
    </script>
</body>
</html>
